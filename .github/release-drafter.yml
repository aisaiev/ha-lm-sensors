name-template: v$RESOLVED_VERSION
tag-template: v$RESOLVED_VERSION
exclude-contributors:
  - github-actions[bot]
  - github-actions
  - dependabot[bot]
  - dependabot
categories:
  - title: 🚀 Features
    labels:
      - feature
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - fix
      - bug
  - title: 💎 Maintenance
    labels:
      - chore
      - dependencies
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - dependencies
  default: patch
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/aisaiev/ha-lm-sensors/compare/$PREVIOUS_TAG...$VERSION
